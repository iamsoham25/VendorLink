<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Supplier Dashboard • VendorLink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" };</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900">

  <!-- Navbar -->
  <script type="module" src="assets/js/navbar.js"></script>

  <div class="max-w-6xl mx-auto p-6">
    <div class="flex items-center justify-between mb-8 pb-4 border-b dark:border-gray-700">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Supplier Hub</h1>
        <p class="text-gray-500 text-sm">Manage your inventory and track performance.</p>
      </div>
      <div class="flex space-x-2">
        <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">B2B
          Professional</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

      <!-- Left: Inventory Management (3 cols) -->
      <div class="lg:col-span-3 space-y-8">

        <!-- List -->
        <section>
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold">Active Catalog</h2>
            <button id="refreshProducts" class="text-amber-600 text-sm hover:underline">Refresh List</button>
          </div>
          <div id="productList" class="grid gap-4">
            <!-- Products injected here -->
            <p class="text-gray-400 italic py-10 text-center bg-white dark:bg-gray-800 rounded-2xl">Fetching your
              products...</p>
          </div>
        </section>

        <!-- Add Form -->
        <section
          class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
          <h3 class="text-lg font-bold mb-4">Add New Product</h3>
          <form id="addProductForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Product Name</label>
              <input id="pname" placeholder="Tomato, Rice, etc." required
                class="w-full p-2 border rounded-lg dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Category</label>
              <select id="pcategory" required
                class="w-full p-2 border rounded-lg dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-sm">
                <option value="Vegetables">Vegetables</option>
                <option value="Dairy">Dairy</option>
                <option value="Grains">Grains</option>
                <option value="Spices">Spices</option>
                <option value="Packaging">Packaging</option>
                <option value="Fruits">Fruits</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Price (₹)</label>
              <input id="pprice" type="number" placeholder="0.00" required
                class="w-full p-2 border rounded-lg dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Image URL</label>
              <input id="pimage" placeholder="https://..."
                class="w-full p-2 border rounded-lg dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Tags (comma separated)</label>
              <input id="ptags" placeholder="Organic, Premium, Bulk"
                class="w-full p-2 border rounded-lg dark:bg-gray-900 border-gray-200 dark:border-gray-700 text-sm">
            </div>
            <div class="flex items-center mt-6">
              <input id="pstock" type="checkbox" checked class="w-4 h-4 text-amber-600 rounded">
              <label class="ml-2 text-sm font-bold text-gray-700 dark:text-gray-300">In Stock</label>
            </div>
            <div class="md:col-span-2">
              <button
                class="w-full bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-bold transition-all mt-2">
                Add to Catalog
              </button>
            </div>
          </form>
        </section>
      </div>

      <!-- Right: Highlights & Quick Links (1 col) -->
      <div class="space-y-6">

        <!-- Stats -->
        <div class="bg-gray-900 text-white p-6 rounded-2xl shadow-lg">
          <h3 class="text-gray-400 text-xs font-bold uppercase mb-4 tracking-widest">Performance</h3>
          <div class="space-y-4">
            <div>
              <p class="text-2xl font-bold" id="totalOrders">0</p>
              <p class="text-gray-400 text-xs mt-1">Total Orders</p>
            </div>
            <div class="pt-4 border-t border-gray-800">
              <p class="text-2xl font-bold text-amber-500" id="revenue">₹0</p>
              <p class="text-gray-400 text-xs mt-1">Total Revenue</p>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 space-y-2">
          <h3 class="text-gray-400 text-xs font-bold uppercase mb-3 tracking-widest px-2">Navigation</h3>
          <a href="supplier-marketplace.html"
            class="flex items-center space-x-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-colors group">
            <div class="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg text-blue-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
              </svg>
            </div>
            <span class="font-medium text-sm">Requirements</span>
          </a>
          <a href="supplier_orders.html"
            class="flex items-center space-x-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-colors">
            <div class="p-2 bg-orange-100 dark:bg-orange-900/30 rounded-lg text-orange-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
              </svg>
            </div>
            <span class="font-medium text-sm">Fulfillment</span>
          </a>
          <a href="supplier_analytics.html"
            class="flex items-center space-x-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-colors">
            <div class="p-2 bg-purple-100 dark:bg-purple-900/30 rounded-lg text-purple-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
              </svg>
            </div>
            <span class="font-medium text-sm">Insights</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="assets/js/supplier_dashboard.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supplier Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-100">

<script type="module" src="assets/js/navbar.js"></script>

<section class="max-w-6xl mx-auto mt-10">

  <h1 class="text-3xl font-bold text-amber-600 mb-6">Analytics Dashboard</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <div class="bg-white shadow rounded-xl p-6">
      <p class="text-gray-500">Total Orders</p>
      <h2 id="ordersCount" class="text-3xl font-bold"></h2>
    </div>

    <div class="bg-white shadow rounded-xl p-6">
      <p class="text-gray-500">Revenue</p>
      <h2 id="revenue" class="text-3xl font-bold text-green-600"></h2>
    </div>

    <div class="bg-white shadow rounded-xl p-6">
      <p class="text-gray-500">Top Product</p>
      <h2 id="topProduct" class="text-xl font-semibold"></h2>
    </div>

  </div>

  <div class="bg-white shadow rounded-xl p-6 mt-8">
    <h2 class="text-xl font-semibold mb-4">Monthly Revenue</h2>
    <canvas id="revenueChart"></canvas>
  </div>

</section>

<script type="module" src="assets/js/supplier_analytics.js"></script>

</body>
</html>

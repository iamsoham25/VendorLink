<!DOCTYPE html>
<html lang="en" class="bg-gray-100 dark:bg-gray-900">
<head>
  <meta charset="UTF-8">
  <title>My Cart • VendorLink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="text-gray-900 dark:text-gray-100">

<!-- Navbar -->


<script type="module" src="assets/js/navbar.js"></script>

<section class="max-w-5xl mx-auto px-4 py-10">

  <h1 class="text-3xl font-bold text-amber-600 mb-4">My Cart</h1>

  <div id="cartContainer" class="space-y-4">
    <!-- Dynamic items appear here -->
  </div>

  <!-- Total & Checkout -->
  <div class="mt-6 bg-white dark:bg-gray-800 rounded-xl shadow p-6 flex justify-between items-center">
    <p class="text-xl font-bold">
      Total: ₹<span id="cartTotal">0</span>
    </p>

    <button id="checkoutBtn"
            class="bg-amber-600 hover:bg-amber-700 text-white py-3 px-6 rounded-xl text-lg font-semibold">
      Place Order
    </button>
  </div>

</section>

<script type="module" src="assets/js/cart.js"></script>

</body>
</html>

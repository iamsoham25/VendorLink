<!DOCTYPE html>
<html lang="en" class="bg-gray-100 dark:bg-gray-900">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | VendorLink</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/recommendations.css">

  <style>
    .nav-link {
      color: #444;
      text-decoration: none;
    }

    .nav-link:hover {
      color: #d97706;
    }

    .dark .nav-link {
      color: #ddd;
    }

    .btn-outline {
      padding: 6px 14px;
      border: 1px solid #d97706;
      color: #d97706;
      border-radius: 8px;
    }

    .btn-filled {
      background: #d97706;
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
    }

    .profile-btn {
      padding: 6px 14px;
      background: #f3f4f6;
      border-radius: 8px;
    }

    .dropdown-item {
      padding: 10px 15px;
      display: block;
      text-align: left;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .dropdown-item:hover {
      background: #f5f5f5;
    }

    .toggle-checkbox {
      width: 40px;
      height: 20px;
      accent-color: #d97706;
    }

    .theme-btn {
      padding: 6px;
      background: #e5e7eb;
      border-radius: 6px;
    }

    .filter-chip {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .filter-chip.active {
      background: #d97706;
      color: white;
      border-color: #d97706;
    }

    .tag-pill {
      font-size: 0.7rem;
      background: #fef3c7;
      color: #92400e;
      padding: 3px 8px;
      border-radius: 999px;
      margin-right: 4px;
    }

    .badge-stock {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 999px;
    }
  </style>
</head>

<body class="text-gray-900 dark:text-gray-100">

  <!-- AUTO-LOAD NAVBAR -->
  <script type="module" defer src="assets/js/navbar.js"></script>

  <!-- MAIN MARKETPLACE CONTENT -->
  <section class="max-w-7xl mx-auto px-4 py-8 md:py-10">

    <h1 class="text-3xl md:text-4xl font-bold text-amber-600 mb-2">Raw Material Marketplace</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
      Filter by category, price, supplier, availability, and more.
    </p>

    <!-- MARKETPLACE SECTION -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mt-6">

      <!-- LEFT SIDEBAR FILTERS -->
      <aside class="md:col-span-1 bg-white dark:bg-gray-800 rounded-2xl shadow p-4 space-y-5 h-max sticky top-24">

        <!-- Search -->
        <div>
          <label class="text-xs font-semibold text-gray-500">Search</label>
          <input id="searchBar" placeholder="Tomato, rice, oil..." class="mt-1 w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                      bg-gray-50 dark:bg-gray-900 text-sm" />
        </div>

        <!-- Category -->
        <div>
          <p class="text-xs font-semibold text-gray-500 mb-2">Category</p>
          <div id="categoryChips" class="flex flex-wrap gap-2 text-xs">
            <button class="filter-chip active" data-category="all">All</button>
            <button class="filter-chip" data-category="Vegetables">Vegetables</button>
            <button class="filter-chip" data-category="Grains">Grains</button>
            <button class="filter-chip" data-category="Spices">Spices</button>
            <button class="filter-chip" data-category="Oil & Ghee">Oil & Ghee</button>
            <button class="filter-chip" data-category="Packaging">Packaging</button>
          </div>
        </div>

        <!-- Price Range -->
        <div>
          <p class="text-xs font-semibold text-gray-500 mb-2">Price Range (₹)</p>
          <div class="flex gap-2">
            <input id="priceMin" type="number" placeholder="Min" class="w-1/2 px-2 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                        bg-gray-50 dark:bg-gray-900 text-xs" />
            <input id="priceMax" type="number" placeholder="Max" class="w-1/2 px-2 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                        bg-gray-50 dark:bg-gray-900 text-xs" />
          </div>
        </div>

        <!-- Supplier -->
        <div>
          <p class="text-xs font-semibold text-gray-500 mb-2">Supplier</p>
          <select id="supplierSelect" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-gray-50 dark:bg-gray-900 text-xs">
            <option value="">All suppliers</option>
          </select>
        </div>

        <!-- Rating -->
        <div>
          <p class="text-xs font-semibold text-gray-500 mb-2">Minimum Rating</p>
          <select id="ratingSelect" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-gray-50 dark:bg-gray-900 text-xs">
            <option value="">Any rating</option>
            <option value="4.5">4.5 ★ & above</option>
            <option value="4">4.0 ★ & above</option>
            <option value="3.5">3.5 ★ & above</option>
          </select>
        </div>

        <!-- Availability -->
        <div class="flex items-center justify-between">
          <label class="text-xs font-semibold text-gray-500">In Stock only</label>
          <input id="inStockOnly" type="checkbox" class="toggle-checkbox" />
        </div>

        <!-- Tags -->
        <div>
          <p class="text-xs font-semibold text-gray-500 mb-2">Tags</p>
          <div class="flex flex-wrap gap-2 text-xs" id="tagFilters">
            <label class="flex items-center gap-1">
              <input type="checkbox" value="Organic" class="tagFilterInput">
              <span>Organic</span>
            </label>
            <label class="flex items-center gap-1">
              <input type="checkbox" value="Bulk" class="tagFilterInput">
              <span>Bulk</span>
            </label>
            <label class="flex items-center gap-1">
              <input type="checkbox" value="Daily-use" class="tagFilterInput">
              <span>Daily-use</span>
            </label>
            <label class="flex items-center gap-1">
              <input type="checkbox" value="Premium" class="tagFilterInput">
              <span>Premium</span>
            </label>
          </div>
        </div>

        <!-- Sort & Clear -->
        <div class="pt-2 border-t border-gray-200 dark:border-gray-700">
          <p class="text-xs font-semibold text-gray-500 mb-2">Sort By</p>
          <select id="sortSelect" class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700
                       bg-gray-50 dark:bg-gray-900 text-xs mb-3">
            <option value="">Default</option>
            <option value="low">Price: Low → High</option>
            <option value="high">Price: High → Low</option>
          </select>

          <button id="clearFilters" class="w-full text-xs border border-gray-300 rounded-xl py-2 hover:bg-gray-100
                       dark:hover:bg-gray-800">
            Clear all filters
          </button>
        </div>

      </aside>

      <!-- PRODUCT GRID -->
      <div class="md:col-span-3">
        <div id="productList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #6b7280;">
            <p>Loading products...</p>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- SUPPLIER CONTACT MODAL -->
  <div id="contactModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center px-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 max-w-md w-full">
      <h2 id="modalSupplierName" class="text-xl font-bold mb-2"></h2>
      <p id="modalSupplierLocation" class="text-sm text-gray-500 mb-2"></p>
      <p id="modalSupplierPhone" class="text-sm font-semibold mb-4"></p>
      <p class="text-xs text-gray-500">Contact the supplier directly for bulk pricing and delivery details.</p>

      <button onclick="closeModal()" class="mt-4 w-full bg-amber-600 hover:bg-amber-700 text-white py-2 rounded-lg">
        Close
      </button>
    </div>
  </div>

  <!-- JS FILES -->
  <!-- Socket.IO client (needed for realtime notifications) -->
  <!-- <script src="/socket.io/socket.io.js"></script> -->
  <script type="module" src="assets/js/navbar.js"></script>
  <script src="assets/js/marketplace-simple.js"></script>

  <script>
    // Contact modal functions
    function closeModal() {
      document.getElementById('contactModal').classList.add('hidden');
    }

    console.log("🔍 Marketplace.html script section loaded");
  </script>

</body>

</html>

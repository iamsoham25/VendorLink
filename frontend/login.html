<!DOCTYPE html>
<html lang="en" class="bg-gray-100 dark:bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <title>Login • VendorLink</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" }</script>

  <style>
    .nav-link { color:#444; } 
    .nav-link:hover { color:#d97706; }
    .dark .nav-link { color:#ddd; }
    .btn-outline { padding:6px 14px; border:1px solid #d97706; color:#d97706; border-radius:8px; }
    .btn-filled { background:#d97706; color:white; padding:6px 14px; border-radius:8px; }
    .profile-btn { padding:6px 14px; background:#f3f4f6; border-radius:8px; }
    .dropdown-item { padding:10px 15px; display:block; }
    .theme-btn { padding:6px; background:#e5e7eb; border-radius:6px; }
  </style>
</head>

<body class="text-gray-900 dark:text-gray-100">



<!-- LOGIN CARD -->
<main class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="bg-white dark:bg-gray-800 shadow-xl rounded-2xl p-10 w-full max-w-md">

    <h1 class="text-3xl font-bold text-center mb-6">Login to VendorLink</h1>

    <form id="loginForm" class="space-y-6">

      <div>
        <label>Email</label>
        <input id="email" type="email" required class="w-full p-3 border rounded-lg dark:bg-gray-900" autocomplete="off" value="">
      </div>

      <div>
        <label>Password</label>
        <input id="password" type="password" required class="w-full p-3 border rounded-lg dark:bg-gray-900" autocomplete="off" value="">
      </div>

      <!-- 🔥 ROLE SELECTOR ADDED -->
      <div>
        <label>Select Role</label>
        <select id="loginRole" required class="w-full p-3 border rounded-lg dark:bg-gray-900">
          <option value="vendor">Vendor</option>
          <option value="supplier">Supplier</option>
        </select>
      </div>

      <button id="loginBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg text-lg font-semibold">
        Login
      </button>

      <!-- error message placeholder -->
      <p id="loginError" class="text-red-500 text-sm text-center mt-2 hidden"></p>
    </form>

    <p class="text-center mt-6 text-sm">
      Don't have an account?
      <a href="signup.html" class="text-amber-600 font-semibold">Sign Up</a>
    </p>
  </div>
</main>

<script type="module" src="assets/js/navbar.js"></script>
<script type="module" src="assets/js/login.js"></script>

</body>
</html>

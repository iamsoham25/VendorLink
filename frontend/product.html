<!DOCTYPE html>
<html lang="en" class="bg-gray-100 dark:bg-gray-900">
<head>
  <meta charset="UTF-8" />
  <title>Product • VendorLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode:"class" }</script>

  <style>
    .nav-link{color:#444;} .nav-link:hover{color:#d97706;}
    .btn-outline{padding:6px 14px;border:1px solid #d97706;border-radius:8px;}
    .btn-filled{padding:6px 14px;background:#d97706;color:#fff;border-radius:8px;}
  </style>
</head>

<body class="text-gray-900 dark:text-gray-100">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <div onclick="location.href='index.html'" class="text-amber-600 text-2xl font-bold cursor-pointer">VendorLink</div>

    <div class="flex gap-6">
      <a href="index.html" class="nav-link">Home</a>
      <a href="marketplace.html" class="nav-link">Marketplace</a>
      <a id="nav-supplier-dashboard" href="supplier_dashboard.html" class="nav-link hidden">Dashboard</a>
    </div>

    <div class="flex gap-4 items-center">
      <div id="nav-auth-guest" class="flex gap-3">
        <a href="login.html" class="btn-outline">Login</a>
        <a href="signup.html" class="btn-filled">Sign Up</a>
      </div>

      <div id="nav-auth-user" class="hidden relative">
        <button id="profileBtn" class="profile-btn">Profile ⬇</button>
        <div id="profileDropdown" class="hidden absolute right-0 bg-white dark:bg-gray-800 shadow-lg rounded-lg">
          <a href="profile.html" class="dropdown-item">My Profile</a>
          <button id="logoutBtn" class="dropdown-item text-red-500">Logout</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<main class="max-w-4xl mx-auto px-4 py-10">

  <div class="grid lg:grid-cols-2 gap-10">

    <img id="p-image" class="rounded-xl shadow-lg w-full">

    <div>
      <h1 id="p-name" class="text-4xl font-bold mb-3"></h1>
      <p id="p-category" class="text-gray-500 dark:text-gray-400 mb-4"></p>
      <p id="p-price" class="text-3xl text-amber-600 font-bold mb-6"></p>

      <button
        id="orderBtn"
        class="bg-amber-600 text-white px-6 py-3 rounded-lg text-lg font-semibold hover:bg-amber-700">
        Order Product
      </button>
    </div>

  </div>

</main>

<script type="module" src="assets/js/navbar.js"></script>
<script type="module" src="assets/js/product.js"></script>
<!-- Socket.IO client (needed for realtime notifications) -->
<script src="/socket.io/socket.io.js"></script>

</body>
</html>
